<!DOCTYPE html>
<html>

<body>

<h1>AI Interview Practice</h1>

<button onclick="getQuestion()">Generate Question</button>

<p id="question"></p>

<textarea id="answer" placeholder="Write your answer"></textarea>

<button onclick="submitAnswer()">Submit Answer</button>

<p id="result"></p>

<script>

async function getQuestion(){

const res = await fetch("http://localhost:5000/api/interview/question")

const data = await res.json()

document.getElementById("question").innerText = data.question

}


async function submitAnswer(){

const question = document.getElementById("question").innerText

const answer = document.getElementById("answer").value

const res = await fetch("http://localhost:5000/api/interview/evaluate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
question,
answer
})

})

const data = await res.json()

document.getElementById("result").innerText = data.result

}

</script>

</body>

</html>
